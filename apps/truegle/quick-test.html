<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Phone Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
        }
        h1 { color: #667eea; font-size: 24px; margin-bottom: 20px; }
        .test {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #ddd;
        }
        .test.pass { border-left-color: #28a745; background: #f0fff4; }
        .test.fail { border-left-color: #dc3545; background: #fff0f0; }
        .test.running { border-left-color: #ffa500; background: #fff9f0; }
        .status {
            font-size: 40px;
            float: right;
        }
        .title {
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .message {
            font-size: 14px;
            color: #666;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            width: 100%;
            margin-top: 20px;
        }
        .summary {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #eee;
        }
        .summary h2 { color: #667eea; margin-bottom: 10px; }
        .big-number { font-size: 48px; font-weight: bold; margin: 10px 0; }
        .big-number.pass { color: #28a745; }
        .big-number.fail { color: #dc3545; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Quick Phone Test</h1>

        <div id="test1" class="test">
            <span class="status">⏳</span>
            <div class="title">1. Backend Health</div>
            <div class="message">Checking if server responds...</div>
        </div>

        <div id="test2" class="test">
            <span class="status">⏳</span>
            <div class="title">2. Camera Database</div>
            <div class="message">Checking state list...</div>
        </div>

        <div id="test3" class="test">
            <span class="status">⏳</span>
            <div class="title">3. Oregon Cameras</div>
            <div class="message">Checking your local cameras...</div>
        </div>

        <div id="test4" class="test">
            <span class="status">⏳</span>
            <div class="title">4. Camera Search</div>
            <div class="message">Testing search functionality...</div>
        </div>

        <button onclick="location.href='/'">✅ Tests Passed - Open App</button>

        <div class="summary" id="summary" style="display: none;">
            <h2>Results</h2>
            <div class="big-number pass" id="passed">0</div>
            <div>tests passed</div>
        </div>
    </div>

    <script>
        const BACKEND = window.location.origin.replace(':3000', ':3001').replace(':5173', ':3001');
        let passed = 0;

        function updateTest(id, status, message) {
            const el = document.getElementById(id);
            el.className = 'test ' + status;
            el.querySelector('.status').textContent = status === 'pass' ? '✅' : status === 'fail' ? '❌' : '⏳';
            el.querySelector('.message').textContent = message;
            if (status === 'pass') passed++;
        }

        async function runTests() {
            // Test 1: Health Check
            try {
                const r = await fetch(BACKEND + '/api/health');
                const data = await r.json();
                if (data.status === 'OK') {
                    updateTest('test1', 'pass', '✅ Server is running!');
                } else {
                    updateTest('test1', 'fail', '❌ Unexpected response');
                }
            } catch (e) {
                updateTest('test1', 'fail', '❌ Cannot connect: ' + e.message);
            }

            // Test 2: States
            try {
                const r = await fetch(BACKEND + '/api/maps/cameras/multi-state-states');
                const data = await r.json();
                if (data.success && data.data.length === 4) {
                    updateTest('test2', 'pass', '✅ Found 4 states (IL, OR, OH, WA)');
                } else {
                    updateTest('test2', 'fail', `❌ Expected 4 states, got ${data.data?.length || 0}`);
                }
            } catch (e) {
                updateTest('test2', 'fail', '❌ Database error: ' + e.message);
            }

            // Test 3: Oregon Cameras
            try {
                const r = await fetch(BACKEND + '/api/maps/cameras/multi-state?state=Oregon&limit=5');
                const data = await r.json();
                if (data.success && data.count > 0) {
                    updateTest('test3', 'pass', `✅ Found ${data.count} Oregon cameras!`);
                } else {
                    updateTest('test3', 'fail', '❌ No Oregon cameras found');
                }
            } catch (e) {
                updateTest('test3', 'fail', '❌ Search error: ' + e.message);
            }

            // Test 4: Text Search
            try {
                const r = await fetch(BACKEND + '/api/maps/cameras/multi-state/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: 'Portland', limit: 5 })
                });
                const data = await r.json();
                if (data.success && data.count > 0) {
                    updateTest('test4', 'pass', `✅ Search works! Found ${data.count} results`);
                } else {
                    updateTest('test4', 'fail', '❌ Search returned 0 results');
                }
            } catch (e) {
                updateTest('test4', 'fail', '❌ Search error: ' + e.message);
            }

            // Show summary
            document.getElementById('passed').textContent = passed;
            document.getElementById('summary').style.display = 'block';

            // Update button
            const btn = document.querySelector('button');
            if (passed === 4) {
                btn.textContent = '🎉 All Tests Passed - Open App';
                btn.style.background = 'linear-gradient(135deg, #28a745 0%, #20c997 100%)';
            } else {
                btn.textContent = `⚠️ ${passed}/4 Passed - Try Anyway`;
                btn.style.background = 'linear-gradient(135deg, #ffa500 0%, #ff6347 100%)';
            }
        }

        // Auto-run on load
        setTimeout(runTests, 500);
    </script>
</body>
</html>
