<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Camera API Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00bcd4, #2196f3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            background: rgba(255, 255, 255, 0.1);
        }

        .status.success {
            background: rgba(76, 175, 80, 0.2);
            border: 1px solid #4caf50;
        }

        .status.error {
            background: rgba(244, 67, 54, 0.2);
            border: 1px solid #f44336;
        }

        button {
            background: linear-gradient(135deg, #00bcd4, #2196f3);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            margin: 10px 0;
            transition: transform 0.2s;
        }

        button:active {
            transform: scale(0.98);
        }

        .camera-list {
            margin-top: 20px;
        }

        .camera-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid rgba(0, 188, 212, 0.3);
        }

        .camera-card h3 {
            font-size: 16px;
            color: #00bcd4;
            margin-bottom: 8px;
        }

        .camera-card p {
            font-size: 14px;
            color: #aaa;
            margin: 4px 0;
        }

        .camera-image {
            width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-number {
            font-size: 32px;
            font-weight: bold;
            color: #00bcd4;
        }

        .stat-label {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #00bcd4;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #00bcd4;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎥 Traffic Camera API Test</h1>
        <p style="color: #aaa; margin-bottom: 20px;">Testing mobile access to 8,503 cameras</p>

        <div id="status" class="status">
            <strong>Status:</strong> Ready to test
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="totalCameras">-</div>
                <div class="stat-label">Total Cameras</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="topRoad">-</div>
                <div class="stat-label">Top Road</div>
            </div>
        </div>

        <button onclick="testAPI()">🔍 Test API Connection</button>
        <button onclick="searchCameras()">📍 Search for I-5 Cameras</button>
        <button onclick="getNearby()">📡 Get Cameras Near Me</button>

        <div id="results" class="camera-list"></div>
    </div>

    <script>
        const API_BASE = window.location.hostname === 'localhost'
            ? 'http://localhost:3001/api/maps'
            : 'http://192.168.1.17:3001/api/maps';

        function showStatus(message, isError = false) {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = isError ? 'status error' : 'status success';
        }

        function showLoading() {
            document.getElementById('results').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading cameras...</p>
                </div>
            `;
        }

        async function testAPI() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/cameras/multi-state-stats`);
                const data = await response.json();

                if (data.success) {
                    showStatus('✅ API Connected Successfully!');
                    document.getElementById('totalCameras').textContent = data.data.total;
                    const topRoad = Object.keys(data.data.byRoad)[0];
                    document.getElementById('topRoad').textContent = topRoad;

                    document.getElementById('results').innerHTML = `
                        <div class="camera-card">
                            <h3>✅ Connection Successful!</h3>
                            <p>Total Cameras: ${data.data.total}</p>
                            <p>Active: ${data.data.active}</p>
                            <p>Top Road: ${topRoad} (${data.data.byRoad[topRoad]} cameras)</p>
                        </div>
                    `;
                } else {
                    showStatus('❌ API Error', true);
                }
            } catch (error) {
                showStatus(`❌ Connection Failed: ${error.message}`, true);
                document.getElementById('results').innerHTML = `
                    <div class="camera-card">
                        <h3>❌ Connection Error</h3>
                        <p>${error.message}</p>
                        <p style="margin-top: 10px;">Make sure backend is running on port 3001</p>
                    </div>
                `;
            }
        }

        async function searchCameras() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/cameras/multi-state/search`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: 'I-5', limit: 5 })
                });

                const data = await response.json();

                if (data.success && data.data.length > 0) {
                    showStatus(`✅ Found ${data.data.length} cameras for "I-5"`);

                    let html = '';
                    data.data.forEach(camera => {
                        html += `
                            <div class="camera-card">
                                <h3>${camera.name}</h3>
                                <p>📍 ${camera.road} ${camera.direction}</p>
                                <p>📏 ${camera.location.lat.toFixed(4)}, ${camera.location.lng.toFixed(4)}</p>
                                ${camera.urls.image ? `<img src="${camera.urls.image}" class="camera-image" alt="${camera.name}">` : '<p>No image available</p>'}
                            </div>
                        `;
                    });

                    document.getElementById('results').innerHTML = html;
                } else {
                    showStatus('❌ No cameras found', true);
                }
            } catch (error) {
                showStatus(`❌ Search Failed: ${error.message}`, true);
            }
        }

        async function getNearby() {
            showLoading();
            showStatus('📍 Getting your location...');

            if (!navigator.geolocation) {
                showStatus('❌ Geolocation not supported', true);
                return;
            }

            navigator.geolocation.getCurrentPosition(async (position) => {
                const { latitude, longitude } = position.coords;
                showStatus(`📍 Location: ${latitude.toFixed(4)}, ${longitude.toFixed(4)}`);

                try {
                    const response = await fetch(
                        `${API_BASE}/cameras/multi-state/near/${latitude}/${longitude}?radius=25&limit=5`
                    );

                    const data = await response.json();

                    if (data.success && data.data.length > 0) {
                        showStatus(`✅ Found ${data.data.length} cameras within 25 miles`);

                        let html = '';
                        data.data.forEach(camera => {
                            html += `
                                <div class="camera-card">
                                    <h3>${camera.name}</h3>
                                    <p>📍 ${camera.road} ${camera.direction}</p>
                                    <p>📏 ${camera.formattedDistance} away</p>
                                    ${camera.urls.image ? `<img src="${camera.urls.image}" class="camera-image" alt="${camera.name}">` : '<p>No image available</p>'}
                                </div>
                            `;
                        });

                        document.getElementById('results').innerHTML = html;
                    } else {
                        showStatus('❌ No cameras found nearby', true);
                    }
                } catch (error) {
                    showStatus(`❌ Failed: ${error.message}`, true);
                }
            }, (error) => {
                showStatus(`❌ Location Error: ${error.message}`, true);
            });
        }

        // Auto-test on load
        window.onload = () => {
            setTimeout(testAPI, 1000);
        };
    </script>
</body>
</html>
