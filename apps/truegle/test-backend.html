<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truegle Backend Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; margin-bottom: 10px; }
        .subtitle { color: #666; margin-bottom: 30px; }
        .test-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .test-section h2 {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 15px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background 0.2s;
        }
        button:hover { background: #5568d3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .result {
            background: white;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 400px;
            overflow-y: auto;
        }
        .result pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .success { border-left: 4px solid #4caf50; }
        .error { border-left: 4px solid #f44336; }
        .pending { border-left: 4px solid #ff9800; }
        .status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-left: 10px;
        }
        .status.success { background: #e8f5e9; color: #2e7d32; }
        .status.error { background: #ffebee; color: #c62828; }
        .status.pending { background: #fff3e0; color: #ef6c00; }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #555;
        }
        .input-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Truegle Backend Diagnostic Tool</h1>
        <p class="subtitle">Test your Railway backend and Google Search API configuration</p>

        <!-- Test 1: Backend Health -->
        <div class="test-section">
            <h2>1. Backend Health Check</h2>
            <button onclick="testHealth()">Test Health Endpoint</button>
            <div id="health-result" class="result" style="display:none;"></div>
        </div>

        <!-- Test 2: Environment Variables -->
        <div class="test-section">
            <h2>2. Environment Variables</h2>
            <button onclick="testVars()">Check Variables</button>
            <div id="vars-result" class="result" style="display:none;"></div>
        </div>

        <!-- Test 3: Google Search API -->
        <div class="test-section">
            <h2>3. Google Search API Test</h2>
            <div class="input-group">
                <label>Search Query:</label>
                <input type="text" id="search-query" value="news" placeholder="Enter search query">
            </div>
            <button onclick="testSearch()">Test Search Endpoint</button>
            <div id="search-result" class="result" style="display:none;"></div>
        </div>

        <!-- Test 4: Direct Google API -->
        <div class="test-section">
            <h2>4. Direct Google API Test</h2>
            <p style="margin-bottom: 10px; color: #666; font-size: 0.9rem;">
                This tests Google Custom Search API directly (bypasses your backend)
            </p>
            <div class="input-group">
                <label>Google API Key:</label>
                <input type="password" id="google-api-key" placeholder="Enter your Google API key">
            </div>
            <div class="input-group">
                <label>Search Engine ID:</label>
                <input type="text" id="google-cse-id" placeholder="Enter your Search Engine ID">
            </div>
            <button onclick="testDirectGoogle()">Test Google API Directly</button>
            <div id="direct-result" class="result" style="display:none;"></div>
        </div>
    </div>

    <script>
        const BACKEND_URL = 'https://joyful-stillness-production-788b.up.railway.app';

        function showResult(elementId, data, isError = false, isPending = false) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.className = 'result ' + (isPending ? 'pending' : isError ? 'error' : 'success');
            el.innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        }

        async function testHealth() {
            const el = document.getElementById('health-result');
            el.style.display = 'block';
            el.className = 'result pending';
            el.innerHTML = '<div>Testing...</div>';

            try {
                const response = await fetch(BACKEND_URL + '/api/health');
                const data = await response.json();
                showResult('health-result', data, !response.ok);
            } catch (error) {
                showResult('health-result', { error: error.message }, true);
            }
        }

        async function testVars() {
            const el = document.getElementById('vars-result');
            el.style.display = 'block';
            el.className = 'result pending';
            el.innerHTML = '<div>Checking environment variables...</div>';

            try {
                const response = await fetch(BACKEND_URL + '/api/debug/vars');
                if (!response.ok) {
                    showResult('vars-result', { 
                        error: 'Debug endpoint not available',
                        message: 'Add /src/routes/debug.js to your backend (see TRUEGLE_BACKEND_FIX.md)'
                    }, true);
                    return;
                }
                const data = await response.json();
                showResult('vars-result', data);
            } catch (error) {
                showResult('vars-result', { error: error.message }, true);
            }
        }

        async function testSearch() {
            const query = document.getElementById('search-query').value || 'news';
            const el = document.getElementById('search-result');
            el.style.display = 'block';
            el.className = 'result pending';
            el.innerHTML = '<div>Searching for "' + query + '"...</div>';

            try {
                const response = await fetch(BACKEND_URL + '/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, page: 1, perPage: 10 })
                });
                const data = await response.json();
                
                if (data.resultCount === 0) {
                    showResult('search-result', {
                        ...data,
                        _diagnosis: 'Backend is working but returning 0 results. Check Google API credentials in Railway dashboard.'
                    }, true);
                } else {
                    showResult('search-result', data);
                }
            } catch (error) {
                showResult('search-result', { error: error.message }, true);
            }
        }

        async function testDirectGoogle() {
            const apiKey = document.getElementById('google-api-key').value;
            const cseId = document.getElementById('google-cse-id').value;
            const query = document.getElementById('search-query').value || 'news';

            if (!apiKey || !cseId) {
                alert('Please enter both Google API Key and Search Engine ID');
                return;
            }

            const el = document.getElementById('direct-result');
            el.style.display = 'block';
            el.className = 'result pending';
            el.innerHTML = '<div>Testing Google API directly...</div>';

            try {
                const url = `https://www.googleapis.com/customsearch/v1?key=${apiKey}&cx=${cseId}&q=${encodeURIComponent(query)}`;
                const response = await fetch(url);
                const data = await response.json();

                if (data.error) {
                    showResult('direct-result', {
                        error: data.error.message,
                        status: data.error.code,
                        help: 'Check that:\n1. Custom Search API is enabled in Google Cloud Console\n2. API key is correct\n3. Search Engine ID is correct'
                    }, true);
                } else {
                    showResult('direct-result', {
                        success: true,
                        resultCount: data.items?.length || 0,
                        items: data.items?.slice(0, 3), // Show first 3 results
                        message: 'Google API is working! Your backend should use these credentials.'
                    });
                }
            } catch (error) {
                showResult('direct-result', { error: error.message }, true);
            }
        }
    </script>
</body>
</html>
